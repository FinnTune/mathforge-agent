# Continuous integration: lint + tests on every push/PR to main or master.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Match pyproject requires-python; catch version-specific failures early.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Editable install pulls runtime + dev deps from pyproject.toml.
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        env:
          # load_settings() requires a non-empty key; tests mock the LLM, not the API.
          ANTHROPIC_API_KEY: dummy-for-ci
        run: pytest -q
